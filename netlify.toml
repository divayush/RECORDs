[build]
  command = "npm run netlify-build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = [
    "backend/dist/**",
    "backend/node_modules/.prisma/client/**",
    "backend/node_modules/@prisma/client/**"
  ]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
